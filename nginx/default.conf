server {
    listen 80;
    server_name _;

    access_log /var/log/nginx/chrishaciacom_access.log;
    error_log /var/log/nginx/chrishaciacom_error.log;

    location / {
        root /var/www/html;
        index index.html;
        try_files $uri /index.html;
    }

    location /api/ {
        proxy_pass http://nextjs:3001/;
    }

    location ~ \.php$ {
        fastcgi_pass php_site:9000;
        fastcgi_index index.php;
        include fastcgi_params;
    }
}
